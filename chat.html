<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>دستیار سلامت</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        /* ===== تمام استایل‌های قبلی (بدون تغییر) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }
        body {
            background: linear-gradient(180deg, #efe9fa, #fdf6f4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            animation: fadePage .4s ease;
        }
        @keyframes fadePage {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: none; }
        }
        .mobile {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: #fdf6f4;
        }
        .header {
            position: sticky;
            top: 0;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,.72);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,.5);
            z-index: 100;
            flex-shrink: 0;
        }
        .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .back {
            width: 46px;
            height: 46px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,.08);
            color: #8472a7;
            font-size: 18px;
            text-decoration: none !important;
            border: none;
        }
        .ai-avatar {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: linear-gradient(135deg, #8472a7, #ae9ad5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(132,114,167,.3);
        }
        .info h2 {
            font-size: 18px;
            color: #5e4b82;
        }
        .status {
            font-size: 12px;
            color: #47b56b;
            margin-top: 4px;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        .greeting {
            font-size: 22px;
            color: #8472a7;
            font-weight: 700;
            text-align: center;
            line-height: 1.8;
            opacity: 0.8;
            user-select: none;
            padding: 20px;
        }
        .chat:has(.message) {
            justify-content: flex-start;
        }
        .chat:has(.message) .greeting {
            display: none;
        }
        .message {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: message .35s ease;
            width: 100%;
        }
        @keyframes message {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            justify-content: flex-end;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .bot-avatar {
            background: linear-gradient(135deg, #8472a7, #a995d2);
            color: white;
            box-shadow: 0 8px 18px rgba(132,114,167,.3);
        }
        .user-avatar {
            background: #ece8f8;
            color: #8472a7;
        }
        .bubble {
            max-width: 78%;
            padding: 14px 18px;
            border-radius: 22px;
            line-height: 1.9;
            font-size: 14px;
            position: relative;
            word-break: break-word;
            transition: .25s;
        }
        .bot .bubble {
            background: white;
            color: #444;
            border-radius: 22px 22px 22px 6px;
            box-shadow: 0 12px 30px rgba(0,0,0,.08);
        }
        .user .bubble {
            background: linear-gradient(135deg, #8472a7, #a996d1);
            color: white;
            border-radius: 22px 22px 6px 22px;
            box-shadow: 0 12px 30px rgba(132,114,167,.25);
        }
        .time {
            margin-top: 8px;
            font-size: 11px;
            opacity: .7;
        }
        .bubble:hover {
            transform: translateY(-2px);
        }
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: white;
            border-radius: 22px 22px 22px 6px;
            width: 75px;
            box-shadow: 0 12px 25px rgba(0,0,0,.08);
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8472a7;
            animation: typing 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }
        @keyframes typing {
            0% { transform: translateY(0); opacity: .4; }
            50% { transform: translateY(-6px); opacity: 1; }
            100% { transform: translateY(0); opacity: .4; }
        }
        .task-card {
            margin-top: 12px;
            padding: 14px;
            border-radius: 18px;
            background: #f6f4fb;
            border: 1px solid #ebe5f7;
        }
        .task-card h4 {
            font-size: 14px;
            color: #6b5b88;
            margin-bottom: 8px;
        }
        .task-card p {
            font-size: 13px;
            color: #666;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,.45);
            transform: translate(-50%,-50%);
            animation: ripple .6s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            from { width: 10px; height: 10px; opacity: .6; }
            to { width: 350px; height: 350px; opacity: 0; }
        }
        .bubble { overflow: hidden; }
        .copy-btn {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f2eef9;
            color: #8472a7;
            padding: 7px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: .2s;
        }
        .copy-btn:hover {
            background: #8472a7;
            color: white;
        }
        .chat-input {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,.05);
            flex-shrink: 0;
        }
        .chat-input input {
            flex: 1;
            border: none;
            outline: none;
            background: #f6f4fb;
            border-radius: 28px;
            padding: 12px 18px;
            font-size: 15px;
            color: #444;
        }
        .chat-input button {
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: .25s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .attach { background: #f3eefb; color: #8472a7; }
        .mic { background: #f3eefb; color: #8472a7; }
        .send {
            background: linear-gradient(135deg, #8472a7, #a996d1);
            color: white;
            box-shadow: 0 10px 25px rgba(132,114,167,.35);
        }
        .send:hover { transform: scale(1.05); }
        .send:active { transform: scale(.92); }
        .bottom-nav {
            margin-top: 0;
            padding: 12px 0 10px;
            border-top: 1px solid #eadfdc;
            display: flex;
            justify-content: space-around;
            background: #fdf6f4;
            flex-shrink: 0;
        }
        .nav-item {
            text-align: center;
            font-size: 11px;
            color: #999;
            text-decoration: none;
            transition: .2s;
        }
        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }
        .nav-item.active {
            color: #8472a7;
            font-weight: 700;
        }
        .scroll-bottom {
            position: fixed;
            bottom: 170px;
            right: 25px;
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,.12);
            cursor: pointer;
            display: none;
            color: #8472a7;
            font-size: 18px;
            transition: .25s;
            z-index: 50;
        }
        .scroll-bottom:hover { transform: scale(1.1); }
    </style>
</head>

<body>

<div class="mobile">

    <!-- Header -->
    <div class="header">
        <div class="left">
            <a href="home.html" class="back">
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <div class="ai-avatar">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="info">
                <h2>دستیار سلامت</h2>
                <div class="status">
                    <i class="fa-solid fa-circle"></i>
                    آنلاین
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat" id="chat">
        <div class="greeting">
            سلام 👋<br>
            هر سوالی دارید بپرسید.
        </div>
    </div>

    <!-- Scroll Down -->
    <button class="scroll-bottom" id="scrollBottom" onclick="scrollToBottom()">
        <i class="fa-solid fa-angle-down"></i>
    </button>

    <!-- Input Area -->
    <div class="chat-input">
        <button class="attach"><i class="fa-solid fa-paperclip"></i></button>
        <input type="text" id="messageInput" placeholder="پیام خود را بنویسید..." autocomplete="off">
        <button class="mic"><i class="fa-solid fa-microphone"></i></button>
        <button class="send" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            خانه
        </a>
        <a href="education.html" class="nav-item">
            <i class="fa-solid fa-book-open"></i>
            آموزش
        </a>
        <a href="chat.html" class="nav-item active">
            <i class="fa-solid fa-comments"></i>
            چت‌ها
        </a>
        <a href="reminder.html" class="nav-item">
            <i class="fa-solid fa-bell"></i>
            یادآورها
        </a>
        <a href="daily-care.html" class="nav-item">
            <i class="fa-solid fa-heart"></i>
            مراقبت
        </a>
    </div>

</div>

<script>
    // ========== عناصر DOM ==========
    const chat = document.getElementById("chat");
    const input = document.getElementById("messageInput");
    const greeting = document.querySelector(".greeting");

    // ========== توابع کمکی ==========
    function scrollToBottom() {
        chat.scrollTop = chat.scrollHeight;
    }
    scrollToBottom();

    function currentTime() {
        const d = new Date();
        return d.getHours().toString().padStart(2, "0") + ":" +
               d.getMinutes().toString().padStart(2, "0");
    }

    function addUserMessage(text) {
        if (greeting) greeting.remove();
        chat.innerHTML += `
            <div class="message user">
                <div class="bubble">
                    ${text}
                    <div class="time">${currentTime()}</div>
                </div>
                <div class="avatar user-avatar">😊</div>
            </div>
        `;
        chat.style.justifyContent = 'flex-start';
        scrollToBottom();
    }

    function showTyping() {
        const html = `
            <div class="message bot" id="typing">
                <div class="avatar bot-avatar">🤖</div>
                <div class="typing">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        `;
        chat.insertAdjacentHTML("beforeend", html);
        scrollToBottom();
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    // ========== نمایش پاسخ ربات (تابع جدید) ==========
    function showBot(answer) {
        chat.innerHTML += `
            <div class="message bot">
                <div class="avatar bot-avatar">🤖</div>
                <div class="bubble">
                    ${answer}
                    <div class="copy-btn" onclick="copyText(this)">
                        <i class="fa-regular fa-copy"></i> کپی
                    </div>
                    <div class="time">${currentTime()}</div>
                </div>
            </div>
        `;
        saveChat();
        scrollToBottom();
    }

    // ========== ارسال پیام (نسخه اصلاح‌شده) ==========
    function sendMessage() {
        const text = input.value.trim();
        if (text === "") return;

        addUserMessage(text);
        input.value = "";
        showTyping();

        fetch("chat.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: text
            })
        })
        .then(res => res.json())
        .then(data => {
            removeTyping();
            showBot(data.answer);
        })
        .catch(error => {
            removeTyping();
            showBot("❌ ارتباط با سرور برقرار نشد.");
            console.log(error);
        });
    }

    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            sendMessage();
        }
    });

    // ========== کپی متن ==========
    function copyText(btn) {
        const text = btn.parentElement.innerText.trim();
        navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = '<i class="fa-solid fa-check"></i> کپی شد';
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-regular fa-copy"></i> کپی';
            }, 1500);
        }).catch(() => {
            alert("کپی ناموفق بود.");
        });
    }

    // ========== اثر ریپل ==========
    document.addEventListener("click", function(e) {
        const bubble = e.target.closest(".bubble");
        if (!bubble) return;
        const rect = bubble.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = x + "px";
        ripple.style.top = y + "px";
        bubble.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    });

    // ========== ذخیره تاریخچه چت ==========
    function saveChat() {
        const messages = chat.querySelectorAll('.message');
        if (messages.length > 0) {
            localStorage.setItem("chatHistory", chat.innerHTML);
        } else {
            localStorage.removeItem("chatHistory");
        }
    }

    // ========== بازیابی تاریخچه در بارگذاری صفحه ==========
    window.onload = function() {
        const data = localStorage.getItem("chatHistory");
        if (data) {
            chat.innerHTML = data;
            chat.style.justifyContent = 'flex-start';
            const g = chat.querySelector('.greeting');
            if (g) g.remove();
        }
        scrollToBottom();
    };

    // ========== نمایش دکمه اسکرول ==========
    chat.addEventListener("scroll", () => {
        const btn = document.getElementById("scrollBottom");
        if (chat.scrollTop < chat.scrollHeight - 700) {
            btn.style.display = "block";
        } else {
            btn.style.display = "none";
        }
    });
</script>

</body>
</html>
