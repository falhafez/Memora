<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>همراه ذهن</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn',sans-serif;
}

body{
    min-height:100vh;
    background:#eceaf7;
    display:flex;
    justify-content:center;
    align-items:center;
    /* padding حذف شد تا با صفحه اول یکی شود */
}


.mobile{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:white;
    /* border-radius حذف شد */
    /* overflow:hidden;  حذف شد */
    position:relative;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}


.bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}


.overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,.2);
}


.content{
    position:relative;
    z-index:2;
    min-height:100vh;
    padding:20px;  /* تغییر به 20px برای هماهنگی با صفحه اول */
    display:flex;
    flex-direction:column;
}



/* لوگو بزرگتر و سمت راست */

.logo{
    width:100%;
    display:flex;
    justify-content:center;
}


.logo img{
    width:250px;
}



/* متن نزدیک تر به لوگو */

.subtitle{
    margin-top:0px;
    text-align:center;
    font-size:20px;
    line-height:1.3;
    color:#555;
}



/* لیست */

.list{
    margin-top:22px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px 12px;
}


.item{
    display:flex;
    align-items:center;
    gap:6px;
}


.item i{
    color:#6b58c5;
    font-size:16px;
    width:20px;
}


.item span{
    font-size:12px;
    color:#444;
    line-height:1.4;
}



/* دکمه کوتاه تر */

.start{
    margin-top:auto;
    padding-top:28px;
    padding-bottom:20px;
    display:flex;
    justify-content:center;
}


.start button{
    width:75%;
    height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#7359d9,#4bb7b0);
    color:white;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(115,89,217,.3);
}


.start button:active{
    transform:scale(.97);
}




@media(max-width:360px){

.logo img{
    width:250px;
}


.subtitle{
    font-size:15px;
    margin-top:6px;
}


.list{
    margin-top:18px;
}


.item span{
    font-size:10px;
}


.start button{
    width:80%;
    height:52px;
}

}


</style>

</head>


<body>

<div class="mobile">

<img class="bg" src="bg.png">

<div class="overlay"></div>


<div class="content">


<div class="logo">
    <img src="logo.png">
</div>


<div class="subtitle">
    همراه و یاریگر شما<br>
    در مسیر مراقبت از عزیزان
</div>



<div class="list">

<div class="item">
<i class="fa-regular fa-book-open"></i>
<span>آموزش کاربردی و قابل اعتماد</span>
</div>


<div class="item">
<i class="fa-regular fa-comments"></i>
<span>پشتیبانی هوشمند و همدلانه</span>
</div>


<div class="item">
<i class="fa-regular fa-calendar-days"></i>
<span>مدیریت آسان مراقبت روزانه</span>
</div>


<div class="item">
<i class="fa-regular fa-heart"></i>
<span>حمایت از خود مراقب</span>
</div>


<div class="item">
<i class="fa-regular fa-bell"></i>
<span>یادآورهای هوشمند</span>
</div>


<div class="item">
<i class="fa-solid fa-headset"></i>
<span>ارتباط و راهنمایی سریع</span>
</div>


</div>



<div class="start">

<button onclick="location.href='home.html'">
شروع
</button>

</div>


</div>

</div>

</body>
</html>
