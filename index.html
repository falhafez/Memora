<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>همیار</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn',sans-serif;
}
body{
    min-height:100vh;
    background:#eceaf7;
    display:flex;
    justify-content:center;
    align-items:center;
}
.mobile{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:white;
    position:relative;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}
.bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
.overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,.2);
}
.content{
    position:relative;
    z-index:2;
    min-height:100vh;
    padding:4px 20px 20px;  /* پدینگ بالا بسیار کم شد */
    display:flex;
    flex-direction:column;
}

/* لوگو کوچک‌تر */
.logo{
    width:100%;
    display:flex;
    justify-content:center;
    margin-bottom:0;
}
.logo img{
    width:130px;  /* از 170 به 130 کاهش یافت */
}

.subtitle{
    margin-top:0;  /* فاصله صفر با لوگو */
    text-align:center;
    font-size:20px;
    line-height:1.3;
    color:#555;
}

/* لیست دو ستونی با آیتم‌های وسط‌چین */
.list{
    margin-top:8px;  /* فاصله کمتر با زیرنویس */
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 12px;
}
.item{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
}
.item i{
    color:#6b58c5;
    font-size:15px;
    width:18px;
    text-align:center;
}
.item span{
    font-size:13px;
    color:#444;
    line-height:1.4;
    text-align:center;
}

.start{
    margin-top:auto;
    padding-top:16px;
    padding-bottom:10px;
    display:flex;
    justify-content:center;
}
.start button{
    width:75%;
    height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#7359d9,#4bb7b0);
    color:white;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(115,89,217,.3);
}
.start button:active{
    transform:scale(.97);
}

@media(max-width:360px){
    .logo img{
        width:110px;  /* در موبایل کوچک‌تر */
    }
    .subtitle{
        font-size:15px;
    }
    .list{
        margin-top:6px;
        gap:6px 8px;
    }
    .item span{
        font-size:11px;
    }
    .start button{
        width:80%;
        height:52px;
    }
}
</style>
</head>
<body>
<div class="mobile">
<img class="bg" src="bg.png">
<div class="overlay"></div>
<div class="content">
<div class="logo">
    <img src="logo.png">
</div>
<div class="subtitle">
    همیار، همراه و یاریگر شما<br>
    در مسیر مراقبت از عزیزان
</div>
<div class="list">
<div class="item">
<i class="fa-regular fa-book-open"></i>
<span>آموزش کاربردی و قابل اعتماد</span>
</div>
<div class="item">
<i class="fa-regular fa-comments"></i>
<span>پشتیبانی هوشمند و همدلانه</span>
</div>
<div class="item">
<i class="fa-regular fa-calendar-days"></i>
<span>مدیریت آسان مراقبت روزانه</span>
</div>
<div class="item">
<i class="fa-regular fa-heart"></i>
<span>حمایت از خود مراقب</span>
</div>
<div class="item">
<i class="fa-regular fa-bell"></i>
<span>یادآورهای هوشمند</span>
</div>
<div class="item">
<i class="fa-solid fa-headset"></i>
<span>ارتباط و راهنمایی سریع</span>
</div>
</div>
<div class="start">
<button onclick="location.href='login.html'">شروع</button>
</div>
</div>
</div>
</body>
</html>
