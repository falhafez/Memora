<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود | همیار</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
min-height:100vh;
background:#eceaf7;
display:flex;
justify-content:center;
align-items:center;
}

.mobile{
width:100%;
max-width:480px;
min-height:100vh;
background:#fff;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,.12);
overflow:hidden; /* برای برش لبه‌های بزرگ‌شده */
}

.bg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;

/* ===== مات کردن عکس ===== */
filter: blur(8px);
transform: scale(1.1); /* جلوگیری از لبه‌های سفید بعد از blur */
}

.overlay{
position:absolute;
inset:0;
background:rgba(255,255,255,.2);
}

.content{
position:relative;
z-index:2;
min-height:100vh;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
justify-content:center;
margin-top:20px;
}

.logo img{
width:250px;
}

.title{
text-align:center;
font-size:24px;
font-weight:800;
color:#555;
margin-top:10px;
margin-bottom:35px;
}

.form{
margin-top:20px;
}

input{
width:100%;
height:55px;
border:none;
border-radius:18px;
padding:0 18px;
margin-bottom:15px;
font-size:15px;
background:#fff;
box-shadow:0 4px 12px rgba(0,0,0,.08);
outline:none;
}

input:focus{
box-shadow:0 0 0 3px rgba(115,89,217,.2);
}

button{
width:100%;
height:56px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.login{
margin-top:10px;
background:linear-gradient(90deg,#7359d9,#4bb7b0);
color:#fff;
}

.register{
margin-top:15px;
background:#fff;
color:#7359d9;
border:2px solid #7359d9;
}

.register:hover{
background:#7359d9;
color:#fff;
}

</style>

</head>

<body>

<div class="mobile">

<img src="bg.png" class="bg">

<div class="overlay"></div>

<div class="content">

<div class="logo">
<img src="logo.png">
</div>

<div class="title">
ورود به حساب کاربری
</div>

<div class="form">

<input id="user" type="text" placeholder="نام کاربری">

<input id="pass" type="password" placeholder="رمز عبور">

<button class="login" onclick="login()">
ورود
</button>

<button class="register" onclick="location.href='login2.html'">
ثبت نام
</button>

</div>

</div>

</div>

<script>
// کاربران پیش‌فرض
const defaultUsers = [
    { username:"admin", password:"1234" },
    { username:"ali", password:"1111" },
    { username:"reza", password:"2222" },
    { username:"sara", password:"3333" }
];

function login(){

    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value;

    // کاربران ثبت‌نام‌شده
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // ترکیب کاربران پیش‌فرض و ثبت‌نام‌شده
    let allUsers = defaultUsers.concat(users);

    let found = allUsers.find(function(u){
        return u.username === user && u.password === pass;
    });

   if(found){

    localStorage.setItem("currentUser", user);

    // بررسی اینکه پروفایل این کاربر قبلاً ثبت شده یا نه
    let profiles = JSON.parse(localStorage.getItem("profiles")) || {};

    if(profiles[user]){
        // قبلاً اطلاعاتش ثبت شده
        location.href = "home.html";
    }else{
        // اولین ورود، تکمیل اطلاعات
        location.href = "patient-profile.html";
    }

}else{
    alert("نام کاربری یا رمز عبور اشتباه است.");
}

}

</script>

</body>
</html>
