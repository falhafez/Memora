<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>ثبت موفق</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Vazirmatn}
body{background:#eee7f3;display:flex;justify-content:center}
.mobile{max-width:480px;width:100%;min-height:100vh;background:#fdf6f4;padding:20px}
.success{text-align:center}.icon{width:90px;height:90px;margin:10px auto;border-radius:50%;background:#8472a7;color:#fff;display:flex;align-items:center;justify-content:center;font-size:42px;animation:p .5s}
@keyframes p{0%{transform:scale(.4);opacity:0}100%{transform:scale(1)}}
h2{color:#665580;margin:15px 0 6px}p{color:#777}
.card{margin-top:20px;background:#fff;border-radius:22px;padding:18px;box-shadow:0 8px 25px rgba(132,114,167,.18)}
.title{color:#8472a7;font-weight:700;margin-bottom:12px}
.score{width:120px;height:120px;border-radius:50%;margin:10px auto;border:10px solid #d8ccef;border-top-color:#8472a7;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#8472a7}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
.tip{background:#eee5f7;color:#665580;line-height:2}
button{width:100%;padding:14px;border:none;border-radius:16px;margin-top:12px;font-size:15px;cursor:pointer}
.primary{background:#8472a7;color:#fff}.secondary{background:#fff;border:2px solid #8472a7;color:#8472a7}
.bottom-nav{margin-top:25px;padding-top:15px;border-top:1px solid #eadfdc;display:flex;justify-content:space-around}
.nav-item{text-decoration:none;color:#999;font-size:11px;text-align:center}.nav-item i{display:block;font-size:20px;margin-bottom:5px}.active{color:#8472a7}
</style></head><body><div class="mobile">
<div class="success"><div class="icon"><i class="fa fa-check"></i></div><h2>مراقبت امروز ثبت شد</h2><p>اطلاعات با موفقیت ذخیره شد.</p></div>
<div class="card"><div class="title">امتیاز مراقبت امروز</div><div class="score">85%</div><p style="text-align:center">وضعیت امروز خوب است.</p></div>
<div class="card"><div class="title">خلاصه ثبت</div>
<div class="row"><span>😊 حال بیمار</span><span>خوب</span></div>
<div class="row"><span>📋 علائم</span><span>بی‌قراری، فراموشی</span></div>
<div class="row" style="border:none"><span>📝 یادداشت</span><span>بعد از استراحت آرام‌تر شد.</span></div></div>
<div class="card tip"><b>💜 پیشنهاد ممورا</b><br>فردا نیز وضعیت خواب و اشتهای بیمار را ثبت کنید.</div>
<button class="primary" onclick="location.href='history.html'">مشاهده سوابق</button>
<button class="secondary" onclick="location.href='daily-care.html'">ثبت مراقبت جدید</button>

<a class="nav-item" href="home.html"><i class="fa-solid fa-house"></i>خانه</a>
